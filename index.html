<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GolfScoreTracker">
<meta name="mobile-web-app-capable" content="yes">
<title>GolfScoreTracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --green:#1D9E75; --green-light:#E1F5EE; --green-text:#0F6E56;
  --blue:#378ADD; --blue-light:#E6F1FB; --blue-text:#185FA5;
  --bg:#f5f5f0; --card:#ffffff; --border:rgba(0,0,0,0.10); --border-med:rgba(0,0,0,0.18);
  --text:#1a1a18; --text2:#666660; --text3:#999994;
  --radius:12px; --radius-sm:8px;
}
@media (prefers-color-scheme:dark) {
  :root {
    --bg:#1a1a18; --card:#252523; --border:rgba(255,255,255,0.10); --border-med:rgba(255,255,255,0.18);
    --text:#f0f0ec; --text2:#aaa9a3; --text3:#6e6e68;
    --green-light:#0d3d2b; --green-text:#5DCAA5;
    --blue-light:#0c2a45; --blue-text:#85B7EB;
  }
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:15px; }
body { display:flex; flex-direction:column; overflow:hidden; }

/* Header */
.app-header { background:var(--card); border-bottom:0.5px solid var(--border); padding:12px 16px 0; padding-top:max(12px,env(safe-area-inset-top)); flex-shrink:0; }
.app-title { font-size:18px; font-weight:600; }
.sync-bar { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text3); margin:3px 0 8px; }
.sdot { width:7px; height:7px; border-radius:50%; background:var(--text3); flex-shrink:0; }
.sdot.ok { background:var(--green); }
.sdot.err { background:#D85A30; }
.sdot.spin { background:var(--blue); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
.tabs { display:flex; }
.tab { flex:1; padding:10px 4px; font-size:13px; font-weight:500; border:none; background:none; color:var(--text2); border-bottom:2px solid transparent; cursor:pointer; }
.tab.active { color:var(--green); border-bottom-color:var(--green); }

/* Layout */
.main { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.panel { display:none; padding:16px; padding-bottom:max(24px,env(safe-area-inset-bottom)); }
.panel.active { display:block; }

/* Cards */
.card { background:var(--card); border-radius:var(--radius); border:0.5px solid var(--border); padding:14px; margin-bottom:12px; }
.card-title { font-size:13px; font-weight:600; color:var(--text2); margin-bottom:10px; text-transform:uppercase; letter-spacing:0.05em; }
.field { margin-bottom:12px; }
.field label { display:block; font-size:13px; color:var(--text2); margin-bottom:5px; }
.field input { width:100%; padding:10px 12px; border:0.5px solid var(--border-med); border-radius:var(--radius-sm); background:var(--bg); color:var(--text); font-size:15px; outline:none; }
.field input:focus { border-color:var(--green); }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* Mode & course pills */
.pill-row { display:flex; gap:6px; margin-bottom:10px; }
.mpill { flex:1; padding:9px 8px; border-radius:var(--radius-sm); border:0.5px solid var(--border-med); background:var(--bg); color:var(--text2); font-size:13px; font-weight:500; cursor:pointer; text-align:center; }
.mpill.active { background:var(--green-light); border-color:var(--green); color:var(--green-text); }
.ppill { flex:1; padding:9px 8px; border-radius:var(--radius-sm); border:0.5px solid var(--border-med); background:var(--bg); color:var(--text2); font-size:13px; font-weight:500; cursor:pointer; text-align:center; }
.ppill.pf.active { background:var(--green-light); border-color:var(--green); color:var(--green-text); }
.ppill.pa.active { background:var(--blue-light); border-color:var(--blue); color:var(--blue-text); }
.cpill { flex:1; padding:10px 8px; border-radius:var(--radius-sm); border:0.5px solid var(--border-med); background:var(--bg); color:var(--text2); font-size:13px; font-weight:500; cursor:pointer; text-align:center; line-height:1.4; }
.cpill.active { background:var(--green-light); border-color:var(--green); color:var(--green-text); }
.cbadge { display:block; font-size:10px; margin-top:2px; opacity:0.7; }

/* Scorecard */
.sc-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -14px; padding:0 14px; }
table.sc { border-collapse:collapse; font-size:12px; }
table.sc th,table.sc td { text-align:center; padding:5px 4px; border:0.5px solid var(--border); white-space:nowrap; min-width:30px; }
table.sc th { background:var(--bg); color:var(--text2); font-weight:500; font-size:11px; }
table.sc td.lbl { text-align:left; padding-left:8px; font-weight:500; min-width:130px; background:var(--bg); color:var(--text2); font-size:11px; position:sticky; left:0; z-index:1; }
table.sc td.tot { font-weight:600; background:var(--bg); }
table.sc input[type=number] { width:28px; border:none; background:transparent; text-align:center; font-size:13px; font-weight:600; color:var(--text); padding:1px 0; outline:none; -moz-appearance:textfield; }
table.sc input[type=number]::-webkit-inner-spin-button { display:none; }
table.sc input[type=number]:focus { background:var(--green-light); border-radius:3px; }
.sg { color:var(--green); font-weight:600; }
.snorm { color:var(--text2); }
.sbad { color:#D85A30; }
/* vs par colours */
.vp-eagle { color:#8B5CF6; font-weight:700; }
.vp-birdie { color:var(--green); font-weight:700; }
.vp-par { color:var(--text2); }
.vp-bogey { color:#E8820C; font-weight:600; }
.vp-double { color:#D85A30; font-weight:700; }
.vp-worse { color:#B91C1C; font-weight:700; }
/* match winner cells */
.wf-cell { background:var(--green-light); color:var(--green-text); font-weight:600; font-size:11px; }
.wa-cell { background:var(--blue-light); color:var(--blue-text); font-weight:600; font-size:11px; }
.wh-cell { color:var(--text3); font-size:11px; }

/* Metrics */
.metrics { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.metric { background:var(--bg); border-radius:var(--radius-sm); padding:12px; text-align:center; border:0.5px solid var(--border); }
.metric .mv { font-size:22px; font-weight:600; }
.metric .ml { font-size:11px; color:var(--text2); margin-top:2px; }
.metric.gn .mv { color:var(--green); }
.metric.bl .mv { color:var(--blue); }
.match-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
.match-box { background:var(--bg); border:0.5px solid var(--border); border-radius:var(--radius-sm); padding:10px; text-align:center; }
.match-box .ml { font-size:11px; color:var(--text2); margin-bottom:4px; }
.match-box .mv { font-size:14px; font-weight:600; color:var(--text); }

/* Buttons */
.btn { display:block; width:100%; padding:13px; border-radius:var(--radius-sm); border:none; font-size:15px; font-weight:600; cursor:pointer; transition:opacity 0.15s; margin-bottom:10px; }
.btn:active { opacity:0.75; }
.btn-p { background:var(--green); color:#fff; }
.btn-s { background:var(--bg); color:var(--text); border:0.5px solid var(--border-med); }

/* Filters */
.frow { display:flex; gap:6px; margin-bottom:8px; flex-wrap:wrap; }
.fbtn { padding:6px 12px; border-radius:20px; font-size:12px; font-weight:500; border:0.5px solid var(--border-med); background:var(--bg); color:var(--text2); cursor:pointer; }
.fbtn.active { background:var(--green-light); border-color:var(--green); color:var(--green-text); }

/* History cards */
.round-card { background:var(--card); border-radius:var(--radius); border:0.5px solid var(--border); padding:14px; margin-bottom:10px; }
.rh { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.rdate { font-size:14px; font-weight:600; }
.rcourse { font-size:11px; color:var(--text2); margin-bottom:8px; }
.rpill { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.rpill.pf { background:var(--green-light); color:var(--green-text); }
.rpill.pa { background:var(--blue-light); color:var(--blue-text); }
.rpill.pd { background:var(--bg); color:var(--text2); border:0.5px solid var(--border-med); }
.rpill.solo { background:#F5F0FF; color:#6D28D9; border:0.5px solid #A78BFA; }
.rscores { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.rscores.solo-only { grid-template-columns:1fr; }
.rp { background:var(--bg); border-radius:var(--radius-sm); padding:10px; }
.rpn { font-size:11px; font-weight:600; margin-bottom:3px; }
.rpn.f { color:var(--green-text); }
.rpn.a { color:var(--blue-text); }
.rpd { font-size:13px; font-weight:600; }
.rps { font-size:11px; color:var(--text2); margin-top:2px; }
.rbtns { display:flex; gap:8px; margin-top:10px; }
.rbtn { flex:1; padding:8px; border-radius:var(--radius-sm); border:0.5px solid var(--border-med); background:none; color:var(--text2); font-size:12px; font-weight:500; cursor:pointer; text-align:center; }
.rbtn.view { background:var(--green-light); border-color:var(--green); color:var(--green-text); }
.rbtn.del { color:#A32D2D; }
.del { font-size:11px; padding:4px 10px; border-radius:var(--radius-sm); border:0.5px solid var(--border-med); background:none; color:var(--text2); cursor:pointer; }

/* Course search */
.search-box-wrap { margin-top:10px; display:none; }
.search-box-wrap.open { display:block; }
.search-row { display:flex; gap:8px; }
.search-input { flex:1; padding:10px 12px; border:0.5px solid var(--border-med); border-radius:var(--radius-sm); background:var(--bg); color:var(--text); font-size:15px; outline:none; }
.search-input:focus { border-color:var(--green); }
.search-btn { padding:10px 16px; border-radius:var(--radius-sm); border:none; background:var(--green); color:#fff; font-size:14px; font-weight:600; cursor:pointer; }
.search-results { margin-top:8px; max-height:240px; overflow-y:auto; border-radius:var(--radius-sm); border:0.5px solid var(--border); }
.sri { padding:11px 14px; border-bottom:0.5px solid var(--border); cursor:pointer; background:var(--card); }
.sri:last-child { border-bottom:none; }
.sri:active { background:var(--green-light); }
.sri-name { font-size:14px; font-weight:500; }
.sri-sub { font-size:11px; color:var(--text2); margin-top:2px; }
.search-status { padding:14px; text-align:center; font-size:13px; color:var(--text2); background:var(--card); border-radius:var(--radius-sm); border:0.5px solid var(--border); }
.loaded-banner { background:#FFF8E7; border:0.5px solid #E6A817; border-radius:var(--radius-sm); padding:10px 14px; margin-top:8px; font-size:13px; color:#7A5200; display:none; }
@media (prefers-color-scheme:dark) { .loaded-banner { background:#2e1f05; color:#F59E0B; border-color:#92400E; } }

/* Scorecard modal */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; display:none; align-items:flex-end; }
.modal-bg.open { display:flex; }
.modal { background:var(--card); border-radius:var(--radius) var(--radius) 0 0; width:100%; max-height:90vh; overflow-y:auto; padding:16px; padding-bottom:max(24px,env(safe-area-inset-bottom)); }
.modal-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.modal-title { font-size:16px; font-weight:600; }
.modal-close { width:32px; height:32px; border-radius:50%; border:none; background:var(--bg); color:var(--text2); font-size:18px; cursor:pointer; }
.modal-sub { font-size:12px; color:var(--text2); margin-bottom:14px; }
table.sc-ro { border-collapse:collapse; font-size:12px; width:100%; }
table.sc-ro th,table.sc-ro td { text-align:center; padding:5px 3px; border:0.5px solid var(--border); white-space:nowrap; }
table.sc-ro th { background:var(--bg); color:var(--text2); font-weight:500; font-size:11px; }
table.sc-ro td.lbl { text-align:left; padding-left:8px; font-weight:500; min-width:100px; background:var(--bg); color:var(--text2); font-size:11px; position:sticky; left:0; }
table.sc-ro td.tot { font-weight:600; background:var(--bg); }

/* Charts */
.chart-sec { margin-bottom:20px; }
.ct { font-size:14px; font-weight:600; margin-bottom:8px; }
.cw { position:relative; width:100%; height:220px; }
.leg { display:flex; gap:14px; margin-bottom:8px; font-size:12px; color:var(--text2); flex-wrap:wrap; }
.leg span { display:flex; align-items:center; gap:5px; }
.lsq { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
.wins-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }

/* Misc */
.empty { text-align:center; padding:40px 20px; color:var(--text2); font-size:14px; line-height:1.6; }
.empty-icon { font-size:40px; margin-bottom:12px; }
.ibanner { background:var(--green-light); border:0.5px solid var(--green); border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:14px; font-size:13px; color:var(--green-text); display:none; line-height:1.5; }
.sec-lbl { font-size:12px; color:var(--text2); margin-bottom:6px; font-weight:500; }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">⛳ GolfScoreTracker</div>
  <div class="sync-bar"><div class="sdot" id="sdot"></div><span id="slabel">Connecting…</span></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('entry')">Record</button>
    <button class="tab" onclick="switchTab('history')">History</button>
    <button class="tab" onclick="switchTab('charts')">Charts</button>
  </div>
</div>

<div class="main">

<!-- ── RECORD TAB ── -->
<div id="panel-entry" class="panel active">
  <div id="ibanner" class="ibanner"></div>

  <!-- Mode selector -->
  <div class="card">
    <div class="card-title">Round type</div>
    <div class="pill-row">
      <button class="mpill active" id="mode-paired" onclick="setMode('paired')">👥 Paired match</button>
      <button class="mpill" id="mode-solo" onclick="setMode('solo')">🏌️ Solo round</button>
    </div>
    <div id="solo-player-wrap" style="display:none;">
      <div class="sec-lbl">Who is playing?</div>
      <div class="pill-row">
        <button class="ppill pf active" id="pp-f" onclick="setSoloPlayer('f')">Steve Fletcher</button>
        <button class="ppill pa" id="pp-a" onclick="setSoloPlayer('a')">Steve Adams</button>
      </div>
    </div>
  </div>

  <!-- Course selector -->
  <div class="card">
    <div class="card-title">Course</div>
    <div class="pill-row">
      <button class="cpill active" id="pill-silkstone" onclick="selectCourse('silkstone')">Silkstone<span class="cbadge">18 holes · Par 73</span></button>
      <button class="cpill" id="pill-owston" onclick="selectCourse('owston')">Owston Park<span class="cbadge">9 holes · Par 35</span></button>
    </div>
    <button class="cpill" id="pill-trackman" onclick="toggleSearch()" style="width:100%;margin-top:6px;">🔍 Search Trackman course<span class="cbadge">Any course worldwide</span></button>
    <div class="search-box-wrap" id="search-box-wrap">
      <div class="search-row" style="margin-top:10px;">
        <input type="text" class="search-input" id="course-search-input" placeholder="e.g. Pebble Beach, Augusta…" onkeydown="if(event.key==='Enter')searchCourses()">
        <button class="search-btn" onclick="searchCourses()">Search</button>
      </div>
      <div id="search-results"></div>
      <div id="loaded-banner" class="loaded-banner"></div>
    </div>
  </div>

  <!-- Round details -->
  <div class="card">
    <div class="card-title">Round details</div>
    <div class="field"><label>Date</label><input type="date" id="game-date"></div>
    <div id="hcap-fields"></div>
  </div>

  <div id="scorecard-container"></div>

  <!-- Summary -->
  <div class="card" id="summary-card">
    <div class="card-title">Round summary</div>
    <div id="summary-content"></div>
  </div>

  <button class="btn btn-p" onclick="saveRound()">Save Round to Google Sheets</button>
  <button class="btn btn-s" onclick="syncNow()">↻ Sync from Google Sheets</button>
  <button class="btn btn-s" onclick="clearForm()">Clear Scorecard</button>
</div>

<!-- ── HISTORY TAB ── -->
<div id="panel-history" class="panel">
  <div class="frow">
    <button class="fbtn active" id="hf-all" onclick="setHF('all')">All courses</button>
    <button class="fbtn" id="hf-silkstone" onclick="setHF('silkstone')">Silkstone</button>
    <button class="fbtn" id="hf-owston" onclick="setHF('owston')">Owston Park</button>
  </div>
  <div class="frow">
    <button class="fbtn active" id="hp-all" onclick="setHP('all')">All rounds</button>
    <button class="fbtn" id="hp-paired" onclick="setHP('paired')">Paired</button>
    <button class="fbtn" id="hp-f" onclick="setHP('f')">Fletcher solo</button>
    <button class="fbtn" id="hp-a" onclick="setHP('a')">Adams solo</button>
  </div>
  <button class="btn btn-s" style="margin-bottom:12px;" onclick="syncNow()">↻ Refresh</button>
  <div id="history-content"></div>
</div>

<!-- ── CHARTS TAB ── -->
<div id="panel-charts" class="panel">
  <div class="frow">
    <button class="fbtn active" id="cf-all" onclick="setCF('all')">All courses</button>
    <button class="fbtn" id="cf-silkstone" onclick="setCF('silkstone')">Silkstone</button>
    <button class="fbtn" id="cf-owston" onclick="setCF('owston')">Owston Park</button>
  </div>
  <div class="frow">
    <button class="fbtn active" id="cp-all" onclick="setCP('all')">All rounds</button>
    <button class="fbtn" id="cp-paired" onclick="setCP('paired')">Paired</button>
    <button class="fbtn" id="cp-f" onclick="setCP('f')">Fletcher solo</button>
    <button class="fbtn" id="cp-a" onclick="setCP('a')">Adams solo</button>
  </div>
  <div id="charts-content"></div>
</div>

</div><!-- end .main -->

<!-- Toast -->
<div id="toast" style="position:fixed;bottom:max(32px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(120px);background:#1a1a18;color:#fff;border-radius:14px;padding:16px 24px;font-size:15px;font-weight:600;text-align:center;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,0.35);min-width:260px;max-width:90vw;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),opacity 0.35s;opacity:0;pointer-events:none;">
  <div id="toast-icon" style="font-size:28px;margin-bottom:6px;">✓</div>
  <div id="toast-msg">Saved!</div>
  <div id="toast-sub" style="font-size:12px;font-weight:400;margin-top:4px;opacity:0.75;"></div>
</div>

<!-- Scorecard modal -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-sub" id="modal-sub"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwlOKmFIJppokBJ_TClK2x6VZapWTs5cwp6u-5dgviFSlclVcmHMMoFuBPxSGKIKgOJ/exec';
const GCAPI_KEY = 'XAXIAQF5MRIUAI52A3RT45VU3A';

const COURSES = {
  silkstone: {
    name:'Silkstone Golf Club',
    holes:[
      {n:1,par:4,si:3},{n:2,par:4,si:17},{n:3,par:4,si:11},{n:4,par:3,si:15},{n:5,par:5,si:7},
      {n:6,par:4,si:13},{n:7,par:5,si:1},{n:8,par:4,si:5},{n:9,par:3,si:9},
      {n:10,par:4,si:4},{n:11,par:5,si:8},{n:12,par:5,si:18},{n:13,par:4,si:6},
      {n:14,par:4,si:12},{n:15,par:3,si:16},{n:16,par:4,si:10},{n:17,par:4,si:2},{n:18,par:4,si:14}
    ],
    halves:[{label:'Front 9 — Holes 1–9',tot:'Out',start:0,end:9},{label:'Back 9 — Holes 10–18',tot:'In',start:9,end:18}]
  },
  owston:{
    name:'Owston Park Golf Course',
    holes:[
      {n:1,par:4,si:4},{n:2,par:4,si:8},{n:3,par:3,si:9},{n:4,par:4,si:5},
      {n:5,par:5,si:2},{n:6,par:3,si:6},{n:7,par:4,si:3},{n:8,par:4,si:1},{n:9,par:4,si:7}
    ],
    halves:[{label:'All 9 Holes',tot:'Total',start:0,end:9}]
  }
};

// ── State ────────────────────────────────────────────────
let rounds=[], activeCourse='silkstone', chartObjs=[];
let histCourseFilter='all', histPlayerFilter='all';
let chartCourseFilter='all', chartPlayerFilter='all';
let roundMode='paired', soloPlayer='f';

// ── Sync status ──────────────────────────────────────────
function setSS(state,msg){ document.getElementById('sdot').className='sdot '+state; document.getElementById('slabel').textContent=msg; }

// ── Google Sheets ────────────────────────────────────────
async function fetchFromSheets(){
  setSS('spin','Syncing…');
  try {
    const res=await fetch(SHEET_URL+'?t='+Date.now());
    if(!res.ok) throw new Error();
    const rows=await res.json();
    rounds=Array.isArray(rows)?rows.filter(Boolean):[];
    if(rounds.length&&Array.isArray(rounds[0])){
      rounds=rounds.filter(r=>r[0]).map(r=>{try{return JSON.parse(r[0]);}catch(e){return null;}}).filter(Boolean);
    }
    rounds.sort((a,b)=>a.date.localeCompare(b.date));
    localStorage.setItem('golf-cache',JSON.stringify(rounds));
    setSS('ok','Synced · '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
    return true;
  } catch(e){
    setSS('err','Offline — cached data shown');
    try{const c=localStorage.getItem('golf-cache');if(c)rounds=JSON.parse(c);}catch(e2){}
    return false;
  }
}

// ── Stableford ───────────────────────────────────────────
function calcStab(shots,par,si,hcp,course){
  const n=COURSES[course]?.holes.length||18;
  const h=parseFloat(hcp)||0;
  const net=(shots-par)-(Math.floor(h/n)+(si<=(h%n)?1:0));
  if(net<=-2)return 4+Math.abs(net+2);
  if(net===-1)return 3; if(net===0)return 2; if(net===1)return 1; return 0;
}

// ── Course search ────────────────────────────────────────
async function searchCourses(){
  const q=document.getElementById('course-search-input').value.trim();
  if(!q)return;
  const rEl=document.getElementById('search-results');
  rEl.innerHTML='<div class="search-status">Searching…</div>';
  try{
    const res=await fetch('https://api.golfcourseapi.com/v1/search?search_query='+encodeURIComponent(q),{headers:{'Authorization':'Key '+GCAPI_KEY}});
    if(res.status===401){rEl.innerHTML='<div class="search-status">❌ Invalid API key.</div>';return;}
    if(!res.ok){rEl.innerHTML='<div class="search-status">Search failed. Try again.</div>';return;}
    const data=await res.json();
    const courses=data.courses||[];
    if(!courses.length){rEl.innerHTML='<div class="search-status">No courses found. Try adding the country, e.g. "St Andrews Scotland".</div>';return;}
    window._sr=courses.slice(0,15);
    rEl.innerHTML=courses.slice(0,15).map((c,i)=>{
      const loc=[c.location?.city,c.location?.country].filter(v=>v&&v!=='Unknown').join(', ');
      const n=(c.tees?.male||c.tees?.female||[])[0]?.number_of_holes||'';
      return `<div class="sri" onclick="loadCourse(${i})"><div class="sri-name">${c.club_name||c.course_name||'Unknown'}</div><div class="sri-sub">${loc}${n?' · '+n+' holes':''}</div></div>`;
    }).join('');
  }catch(e){rEl.innerHTML='<div class="search-status">Search failed — check internet connection.</div>';}
}

function loadCourse(idx){
  const c=window._sr?.[idx];if(!c)return;
  const rEl=document.getElementById('search-results');
  try{
    const male=c.tees?.male||[],female=c.tees?.female||[];
    const tee=(male.length?male:female)[0];
    if(!tee?.holes?.length){rEl.innerHTML='<div class="search-status">⚠️ No hole data for this course. Try another.</div>';return;}
    const raw=tee.holes.slice(0,tee.number_of_holes||tee.holes.length);
    const withIdx=raw.map((h,i)=>({...h,holeNum:i+1}));
    const sorted=[...withIdx].sort((a,b)=>(b.yardage||0)-(a.yardage||0));
    const siMap={};sorted.forEach((h,i)=>{siMap[h.holeNum]=i+1;});
    const builtHoles=withIdx.map(h=>({n:h.holeNum,par:parseInt(h.par)||4,si:siMap[h.holeNum]||h.holeNum}));
    const name=c.club_name||c.course_name||'Unknown';
    const loc=[c.location?.city,c.location?.country].filter(v=>v&&v!=='Unknown').join(', ');
    const numH=builtHoles.length;
    COURSES._trackman={
      name:name+(loc?' · '+loc:''),
      holes:builtHoles,
      halves:numH<=9?[{label:'All '+numH+' Holes',tot:'Total',start:0,end:numH}]:
        [{label:'Front 9 — Holes 1–9',tot:'Out',start:0,end:9},{label:'Back 9 — Holes 10–18',tot:'In',start:9,end:numH}]
    };
    activeCourse='_trackman';
    ['silkstone','owston','trackman'].forEach(k=>document.getElementById('pill-'+k)?.classList.remove('active'));
    document.getElementById('pill-trackman').classList.add('active');
    const b=document.getElementById('loaded-banner');
    b.textContent='✓ '+name+' · '+numH+' holes · Par '+builtHoles.reduce((a,h)=>a+h.par,0);
    b.style.display='block';
    rEl.innerHTML='';
    document.getElementById('course-search-input').value='';
    buildScorecard();
  }catch(e){rEl.innerHTML='<div class="search-status">Failed to load course. Try another.</div>';}
}

    const hs=C.holes.slice(half.start,half.end);
    html+=`<div class="card"><div class="card-title">${half.label}</div><div class="sc-wrap"><table class="sc">`;
    html+=`<tr><th class="lbl">Hole</th>${hs.map(h=>`<th>${h.n}</th>`).join('')}<th>${half.tot}</th></tr>`;
    html+=`<tr><td class="lbl">Par</td>${hs.map(h=>`<td>${h.par}</td>`).join('')}<td class="tot">${hs.reduce((a,h)=>a+h.par,0)}</td></tr>`;
    html+=`<tr><td class="lbl">Stroke Index</td>${hs.map(h=>`<td style="color:var(--text3);font-size:11px">${h.si}</td>`).join('')}<td></td></tr>`;

    if(roundMode==='paired'||soloPlayer==='f'){
      html+=`<tr><td class="lbl" style="color:var(--green-text)">Fletcher shots</td>${hs.map(h=>`<td><input type="number" id="sf-${h.n}" min="1" max="15" inputmode="numeric" onchange="recalc()"></td>`).join('')}<td class="tot" id="tgf-${hi}">—</td></tr>`;
    }
    if(roundMode==='paired'||soloPlayer==='a'){
      html+=`<tr><td class="lbl" style="color:var(--blue-text)">Adams shots</td>${hs.map(h=>`<td><input type="number" id="sa-${h.n}" min="1" max="15" inputmode="numeric" onchange="recalc()"></td>`).join('')}<td class="tot" id="tga-${hi}">—</td></tr>`;
    }

    if(roundMode==='solo'){
      const pc=soloPlayer==='f'?'var(--green-text)':'var(--blue-text)';
      html+=`<tr><td class="lbl" style="color:${pc}">vs Par</td>${hs.map(h=>`<td id="vp-${h.n}" class="vp-par">—</td>`).join('')}<td class="tot" id="vp-tot-${hi}">—</td></tr>`;
    } else {
      html+=`<tr><td class="lbl">Stroke winner</td>${hs.map(h=>`<td id="sw-${h.n}" class="wh-cell">—</td>`).join('')}<td id="sw-tot-${hi}" class="tot" style="font-size:11px;"></td></tr>`;
    }

    if(roundMode==='paired'||soloPlayer==='f'){
      html+=`<tr><td class="lbl" style="color:var(--green-text)">Fletcher Stableford</td>${hs.map(h=>`<td id="stf-${h.n}" class="snorm">—</td>`).join('')}<td class="tot" id="tsf-${hi}">—</td></tr>`;
    }
    if(roundMode==='paired'||soloPlayer==='a'){
      html+=`<tr><td class="lbl" style="color:var(--blue-text)">Adams Stableford</td>${hs.map(h=>`<td id="sta-${h.n}" class="snorm">—</td>`).join('')}<td class="tot" id="tsa-${hi}">—</td></tr>`;
    }
    if(roundMode==='paired'){
      html+=`<tr><td class="lbl">Stableford winner</td>${hs.map(h=>`<td id="sbw-${h.n}" class="wh-cell">—</td>`).join('')}<td id="sbw-tot-${hi}" class="tot" style="font-size:11px;"></td></tr>`;
    }
    html+=`</table></div></div>`;

// ── Recalculate ──────────────────────────────────────────
function recalc(){
  const C=COURSES[activeCourse]; if(!C)return;
  const hcF=getHcap('f'), hcA=getHcap('a');
  let gF=0,gA=0,sF=0,sA=0,swF=0,swA=0,sbF=0,sbA=0;
  const ht=C.halves.map(()=>({gf:0,ga:0,sf:0,sa:0,swf:0,swa:0,sbf:0,sba:0,vpg:0,par:0}));

  C.holes.forEach((h,i)=>{
    const hi=C.halves.findIndex(hf=>i>=hf.start&&i<hf.end);
    const vf=parseInt(document.getElementById('sf-'+h.n)?.value)||0;
    const va=parseInt(document.getElementById('sa-'+h.n)?.value)||0;

    let spF=0,spA=0;
    if(vf>0){spF=calcStab(vf,h.par,h.si,hcF,activeCourse);gF+=vf;sF+=spF;ht[hi].gf+=vf;ht[hi].sf+=spF;
      const el=document.getElementById('stf-'+h.n);if(el){el.textContent=spF;el.className=spF>=3?'sg':spF>=2?'snorm':'sbad';}}
    else{const el=document.getElementById('stf-'+h.n);if(el){el.textContent='—';el.className='snorm';}}
    if(va>0){spA=calcStab(va,h.par,h.si,hcA,activeCourse);gA+=va;sA+=spA;ht[hi].ga+=va;ht[hi].sa+=spA;
      const el=document.getElementById('sta-'+h.n);if(el){el.textContent=spA;el.className=spA>=3?'sg':spA>=2?'snorm':'sbad';}}
    else{const el=document.getElementById('sta-'+h.n);if(el){el.textContent='—';el.className='snorm';}}

    if(roundMode==='paired'){
      // Stroke winner
      const sw=document.getElementById('sw-'+h.n);
      if(sw){if(vf>0&&va>0){if(vf<va){sw.textContent='F';sw.className='wf-cell';swF++;ht[hi].swf++;}else if(va<vf){sw.textContent='A';sw.className='wa-cell';swA++;ht[hi].swa++;}else{sw.textContent='H';sw.className='wh-cell';}}else{sw.textContent='—';sw.className='wh-cell';}}
      // Stableford winner
      const sbw=document.getElementById('sbw-'+h.n);
      if(sbw){if(vf>0&&va>0){if(spF>spA){sbw.textContent='F';sbw.className='wf-cell';sbF++;ht[hi].sbf++;}else if(spA>spF){sbw.textContent='A';sbw.className='wa-cell';sbA++;ht[hi].sba++;}else{sbw.textContent='H';sbw.className='wh-cell';}}else{sbw.textContent='—';sbw.className='wh-cell';}}
    }

    if(roundMode==='solo'){
      const sv=soloPlayer==='f'?vf:va;
      const vpEl=document.getElementById('vp-'+h.n);
      if(vpEl){if(sv>0){const d=sv-h.par;vpEl.textContent=vpText(d);vpEl.className=vpClass(d);ht[hi].vpg+=(sv>0?sv-h.par:0);ht[hi].par+=h.par;}else{vpEl.textContent='—';vpEl.className='vp-par';}}
    }
  });

  // Half totals
  ht.forEach((t,i)=>{
    const tgf=document.getElementById('tgf-'+i);if(tgf)tgf.textContent=t.gf||'—';
    const tga=document.getElementById('tga-'+i);if(tga)tga.textContent=t.ga||'—';
    const tsf=document.getElementById('tsf-'+i);if(tsf)tsf.textContent=t.sf||'—';
    const tsa=document.getElementById('tsa-'+i);if(tsa)tsa.textContent=t.sa||'—';
    const swT=document.getElementById('sw-tot-'+i);
    if(swT)swT.textContent=t.swf>t.swa?'F +'+(t.swf-t.swa):t.swa>t.swf?'A +'+(t.swa-t.swf):'All sq';
    const sbT=document.getElementById('sbw-tot-'+i);
    if(sbT)sbT.textContent=t.sbf>t.sba?'F +'+(t.sbf-t.sba):t.sba>t.sbf?'A +'+(t.sba-t.sbf):'All sq';
    const vpT=document.getElementById('vp-tot-'+i);
    if(vpT&&t.par>0){const d=t.vpg;vpT.textContent=vpText(d);vpT.className='tot '+vpClass(d);}
  });

  // Summary
  const sc=document.getElementById('summary-content');
  if(roundMode==='paired'){
    sc.innerHTML=`
      <div class="metrics">
        <div class="metric gn"><div class="mv">${gF||'—'}</div><div class="ml">Fletcher Gross</div></div>
        <div class="metric gn"><div class="mv">${sF||'—'}</div><div class="ml">Fletcher Stableford</div></div>
        <div class="metric bl"><div class="mv">${gA||'—'}</div><div class="ml">Adams Gross</div></div>
        <div class="metric bl"><div class="mv">${sA||'—'}</div><div class="ml">Adams Stableford</div></div>
      </div>
      <div class="match-row">
        <div class="match-box"><div class="ml">Stroke match</div><div class="mv" style="color:${swF>swA?'var(--green-text)':swA>swF?'var(--blue-text)':'var(--text2)'}">${swF>swA?'Fletcher +'+(swF-swA):swA>swF?'Adams +'+(swA-swF):'All square'}</div></div>
        <div class="match-box"><div class="ml">Stableford match</div><div class="mv" style="color:${sF>sA?'var(--green-text)':sA>sF?'var(--blue-text)':'var(--text2)'}">${sF>sA?'Fletcher +'+(sF-sA):sA>sF?'Adams +'+(sA-sF):'Tied'}</div></div>
      </div>
      <div style="font-size:12px;color:var(--text2);text-align:center;line-height:1.8;">
        Stroke holes — F: ${swF} · A: ${swA}<br>
        Stableford holes — F: ${sbF} · A: ${sbA}
      </div>`;
  } else {
    const sg=soloPlayer==='f'?gF:gA, ss=soloPlayer==='f'?sF:sA, hcp=getHcap(soloPlayer);
    const pname=soloPlayer==='f'?'Fletcher':'Adams';
    const totalPar=C.holes.reduce((a,h)=>{const v=parseInt(document.getElementById((soloPlayer==='f'?'sf-':'sa-')+h.n)?.value)||0;return v>0?a+h.par:a;},0);
    const vsPar=sg>0?sg-totalPar:null;
    const holesPlayed=C.holes.filter(h=>(parseInt(document.getElementById((soloPlayer==='f'?'sf-':'sa-')+h.n)?.value)||0)>0).length;
    sc.innerHTML=`
      <div class="metrics">
        <div class="metric gn"><div class="mv">${sg||'—'}</div><div class="ml">${pname} Gross</div></div>
        <div class="metric gn"><div class="mv">${ss||'—'}</div><div class="ml">${pname} Stableford</div></div>
        <div class="metric"><div class="mv" style="color:${vsPar!==null?(vsPar<0?'var(--green)':vsPar===0?'var(--text2)':'#D85A30'):'var(--text)'}">${vsPar!==null?vpText(vsPar):'—'}</div><div class="ml">vs Par</div></div>
        <div class="metric"><div class="mv">${holesPlayed||'—'}</div><div class="ml">Holes played</div></div>
      </div>`;
  }
}

// ── Save round ───────────────────────────────────────────
async function saveRound(){
  const date=document.getElementById('game-date').value;
  if(!date){alert('Please select a date.');return;}
  const C=COURSES[activeCourse]; if(!C){alert('Please select a course.');return;}
  const hcF=getHcap('f'), hcA=getHcap('a');
  let shotsF=[],shotsA=[],stabF=0,stabA=0,grossF=0,grossA=0;
  C.holes.forEach(h=>{
    const vf=parseInt(document.getElementById('sf-'+h.n)?.value)||0;
    const va=parseInt(document.getElementById('sa-'+h.n)?.value)||0;
    shotsF.push(vf);shotsA.push(va);
    if(vf>0){grossF+=vf;stabF+=calcStab(vf,h.par,h.si,hcF,activeCourse);}
    if(va>0){grossA+=va;stabA+=calcStab(va,h.par,h.si,hcA,activeCourse);}
  });
  let strokeHolesF=0,strokeHolesA=0,stabHolesF=0,stabHolesA=0;
  if(roundMode==='paired'){
    C.holes.forEach((h,i)=>{
      const vf=shotsF[i],va=shotsA[i];
      if(vf>0&&va>0){
        if(vf<va)strokeHolesF++;else if(va<vf)strokeHolesA++;
        const spF=calcStab(vf,h.par,h.si,hcF,activeCourse);
        const spA=calcStab(va,h.par,h.si,hcA,activeCourse);
        if(spF>spA)stabHolesF++;else if(spA>spF)stabHolesA++;
      }
    });
  }
  const newRound={
    course:activeCourse, courseName:COURSES[activeCourse]?.name||activeCourse,
    mode:roundMode, soloPlayer:roundMode==='solo'?soloPlayer:null,
    date, hcapF:hcF, hcapA:hcA,
    shotsF, shotsA, stabF, stabA, grossF, grossA,
    strokeHolesF, strokeHolesA, stabHolesF, stabHolesA
  };
  const dupKey=date+'|'+roundMode+'|'+(roundMode==='solo'?soloPlayer+'|':'')+(newRound.courseName);
  const dupIdx=rounds.findIndex(r=>{
    const k=r.date+'|'+(r.mode||'paired')+'|'+((r.mode==='solo'?r.soloPlayer+'|':''))+(r.courseName||r.course);
    return k===dupKey;
  });
  if(dupIdx>=0){if(!confirm('A round already exists for this date. Replace it?'))return;rounds[dupIdx]=newRound;}
  else rounds.push(newRound);
  rounds.sort((a,b)=>a.date.localeCompare(b.date));
  const ok=await saveToSheets(rounds);
  const tag=roundMode==='solo'?(soloPlayer==='f'?'Fletcher':'Adams')+' solo':'Paired match';
  showToast(ok?'✅':'⚠️',ok?'Round saved!':'Saved locally',tag+' · '+(COURSES[activeCourse]?.name||activeCourse)+' · '+date,!ok);
}

function applyFilters(cf,pf){
  let rs=cf==='all'?rounds:rounds.filter(r=>(r.course||'silkstone')===cf);
  if(pf==='paired')rs=rs.filter(r=>r.mode!=='solo');
  else if(pf==='f')rs=rs.filter(r=>r.mode==='solo'&&r.soloPlayer==='f');
  else if(pf==='a')rs=rs.filter(r=>r.mode==='solo'&&r.soloPlayer==='a');
  return rs;
}

// ── History ───────────────────────────────────────────────
function renderHistory(){
  const cont=document.getElementById('history-content');
  const rs=applyFilters(histCourseFilter,histPlayerFilter);
  if(!rs.length){cont.innerHTML='<div class="empty"><div class="empty-icon">📋</div>No rounds found.</div>';return;}
  const fmt=d=>{const[y,m,dy]=d.split('-');return dy+'/'+m+'/'+y;};
  cont.innerHTML=[...rs].reverse().map(r=>{
    const ri=rounds.indexOf(r);
    const cn=r.courseName||COURSES[r.course||'silkstone']?.name||'Unknown';
    const isSolo=r.mode==='solo';
    if(isSolo){
      const sp=r.soloPlayer;
      const pn=sp==='f'?'Steve Fletcher':'Steve Adams';
      const pc=sp==='f'?'f':'a';
      const gr=sp==='f'?r.grossF:r.grossA;
      const st=sp==='f'?r.stabF:r.stabA;
      const hc=sp==='f'?r.hcapF:r.hcapA;
      return`<div class="round-card">
        <div class="rh"><div class="rdate">${fmt(r.date)}</div><span class="rpill solo">Solo</span></div>
        <div class="rcourse">⛳ ${cn} · Hcp ${hc}</div>
        <div class="rscores solo-only"><div class="rp">
          <div class="rpn ${pc}">${pn}</div>
          <div class="rpd">Gross: ${gr||'—'} · Stableford: ${st}</div>
        </div></div>
        <div class="rbtns"><button class="rbtn view" onclick="viewScorecard(${ri})">View scorecard</button><button class="rbtn del" onclick="deleteRound(${ri})">Delete</button></div>
      </div>`;
    }
    const sHF=r.strokeHolesF??r.holesF??0, sHA=r.strokeHolesA??r.holesA??0;
    const sbHF=r.stabHolesF??0, sbHA=r.stabHolesA??0;
    const sw=sHF>sHA?'Fletcher wins (stroke)':sHA>sHF?'Adams wins (stroke)':'Stroke all square';
    const stw=r.stabF>r.stabA?'Fletcher wins':r.stabA>r.stabF?'Adams wins':'Draw';
    const pc=r.stabF>r.stabA?'pf':r.stabA>r.stabF?'pa':'pd';
    return`<div class="round-card">
      <div class="rh"><div class="rdate">${fmt(r.date)}</div><span class="rpill ${pc}">${stw}</span></div>
      <div class="rcourse">⛳ ${cn} · Hcp F:${r.hcapF} / A:${r.hcapA}</div>
      <div class="rscores">
        <div class="rp"><div class="rpn f">Steve Fletcher</div><div class="rpd">Gross: ${r.grossF||'—'}</div><div class="rpd">Stableford: ${r.stabF}</div><div class="rps">Stroke: ${sHF} holes · Stab: ${sbHF} holes</div></div>
        <div class="rp"><div class="rpn a">Steve Adams</div><div class="rpd">Gross: ${r.grossA||'—'}</div><div class="rpd">Stableford: ${r.stabA}</div><div class="rps">Stroke: ${sHA} holes · Stab: ${sbHA} holes</div></div>
      </div>
      <div style="font-size:12px;color:var(--text2);text-align:center;padding:6px 0 2px;">${sw}</div>
      <div class="rbtns"><button class="rbtn view" onclick="viewScorecard(${ri})">View scorecard</button><button class="rbtn del" onclick="deleteRound(${ri})">Delete</button></div>
    </div>`;
  }).join('');
}

async function deleteRound(i){if(!confirm('Delete this round?'))return;rounds.splice(i,1);await saveToSheets(rounds);renderHistory();}

// ── Scorecard viewer ──────────────────────────────────────
function viewScorecard(idx){
  const r=rounds[idx];if(!r)return;
  const C=COURSES[r.course||'silkstone'];if(!C)return;
  const fmt=d=>{const[y,m,dy]=d.split('-');return dy+'/'+m+'/'+y;};
  const isSolo=r.mode==='solo';
  const sp=r.soloPlayer;
  document.getElementById('modal-title').textContent=r.courseName||C.name;
  document.getElementById('modal-sub').textContent=fmt(r.date)+(isSolo?' · Solo — '+(sp==='f'?'Steve Fletcher':'Steve Adams')+' (hcp '+( sp==='f'?r.hcapF:r.hcapA)+')'  :' · F hcp '+r.hcapF+' / A hcp '+r.hcapA);
  let html='';
  C.halves.forEach(half=>{
    const hs=C.holes.slice(half.start,half.end);
    html+=`<div style="margin-bottom:14px;"><div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;">${half.label}</div><div class="sc-wrap"><table class="sc-ro">`;
    html+=`<tr><th class="lbl">Hole</th>${hs.map(h=>`<th>${h.n}</th>`).join('')}<th>${half.tot}</th></tr>`;
    html+=`<tr><td class="lbl">Par</td>${hs.map(h=>`<td>${h.par}</td>`).join('')}<td class="tot">${hs.reduce((a,h)=>a+h.par,0)}</td></tr>`;
    html+=`<tr><td class="lbl">SI</td>${hs.map(h=>`<td style="color:var(--text3);font-size:10px">${h.si}</td>`).join('')}<td></td></tr>`;

    const showF=!isSolo||sp==='f', showA=!isSolo||sp==='a';
    if(showF){
      let tg=0;
      html+=`<tr><td class="lbl" style="color:var(--green-text)">Fletcher shots</td>`;
      hs.forEach(h=>{const v=r.shotsF[C.holes.findIndex(x=>x.n===h.n)]||0;tg+=v;html+=`<td>${v||'—'}</td>`;});
      html+=`<td class="tot">${tg||'—'}</td></tr>`;
    }
    if(showA){
      let tg=0;
      html+=`<tr><td class="lbl" style="color:var(--blue-text)">Adams shots</td>`;
      hs.forEach(h=>{const v=r.shotsA[C.holes.findIndex(x=>x.n===h.n)]||0;tg+=v;html+=`<td>${v||'—'}</td>`;});
      html+=`<td class="tot">${tg||'—'}</td></tr>`;
    }

    if(isSolo){
      const shotsArr=sp==='f'?r.shotsF:r.shotsA;
      let totalVP=0,totalPar=0;
      html+=`<tr><td class="lbl">vs Par</td>`;
      hs.forEach(h=>{const ai=C.holes.findIndex(x=>x.n===h.n);const v=shotsArr[ai]||0;if(v>0){const d=v-h.par;totalVP+=d;totalPar+=h.par;html+=`<td class="${vpClass(d)}">${vpText(d)}</td>`;}else html+=`<td class="vp-par">—</td>`;});
      html+=`<td class="tot ${vpClass(totalVP)}">${totalPar>0?vpText(totalVP):'—'}</td></tr>`;
    } else {
      let swF=0,swA=0;
      html+=`<tr><td class="lbl">Stroke winner</td>`;
      hs.forEach(h=>{const ai=C.holes.findIndex(x=>x.n===h.n);const vf=r.shotsF[ai]||0,va=r.shotsA[ai]||0;if(vf>0&&va>0){if(vf<va){html+=`<td class="wf-cell">F</td>`;swF++;}else if(va<vf){html+=`<td class="wa-cell">A</td>`;swA++;}else html+=`<td class="wh-cell">H</td>`;}else html+=`<td class="wh-cell">—</td>`;});
      html+=`<td class="tot" style="font-size:11px;">${swF>swA?'F +'+(swF-swA):swA>swF?'A +'+(swA-swF):'Sq'}</td></tr>`;
    }

    if(showF){
      let ts=0,stabsF=[];
      html+=`<tr><td class="lbl" style="color:var(--green-text)">Fletcher Stab</td>`;
      hs.forEach(h=>{const ai=C.holes.findIndex(x=>x.n===h.n);const v=r.shotsF[ai]||0;if(v>0){const sp2=calcStab(v,h.par,h.si,r.hcapF,r.course||'silkstone');ts+=sp2;stabsF.push(sp2);html+=`<td class="${sp2>=3?'sg':sp2>=2?'snorm':'sbad'}">${sp2}</td>`;}else{stabsF.push(0);html+=`<td class="snorm">—</td>`;}});
      html+=`<td class="tot">${ts||'—'}</td></tr>`;
    }
    if(showA){
      let ts=0,stabsA=[];
      html+=`<tr><td class="lbl" style="color:var(--blue-text)">Adams Stab</td>`;
      hs.forEach(h=>{const ai=C.holes.findIndex(x=>x.n===h.n);const v=r.shotsA[ai]||0;if(v>0){const sp2=calcStab(v,h.par,h.si,r.hcapA,r.course||'silkstone');ts+=sp2;stabsA.push(sp2);html+=`<td class="${sp2>=3?'sg':sp2>=2?'snorm':'sbad'}">${sp2}</td>`;}else{stabsA.push(0);html+=`<td class="snorm">—</td>`;}});
      html+=`<td class="tot">${ts||'—'}</td></tr>`;
    }
    if(!isSolo){
      const sfArr=[],saArr=[];
      hs.forEach(h=>{const ai=C.holes.findIndex(x=>x.n===h.n);sfArr.push(r.shotsF[ai]||0);saArr.push(r.shotsA[ai]||0);});
      let sbF2=0,sbA2=0;
      html+=`<tr><td class="lbl">Stableford winner</td>`;
      hs.forEach((h,i)=>{const vf=sfArr[i],va=saArr[i];if(vf>0&&va>0){const spF2=calcStab(vf,h.par,h.si,r.hcapF,r.course||'silkstone');const spA2=calcStab(va,h.par,h.si,r.hcapA,r.course||'silkstone');if(spF2>spA2){html+=`<td class="wf-cell">F</td>`;sbF2++;}else if(spA2>spF2){html+=`<td class="wa-cell">A</td>`;sbA2++;}else html+=`<td class="wh-cell">H</td>`;}else html+=`<td class="wh-cell">—</td>`;});
      html+=`<td class="tot" style="font-size:11px;">${sbF2>sbA2?'F +'+(sbF2-sbA2):sbA2>sbF2?'A +'+(sbA2-sbF2):'Sq'}</td></tr>`;
    }
    html+=`</table></div></div>`;
  });
  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}

// ── Charts ─────────────────────────────────────────────────
function renderCharts(){
  chartObjs.forEach(c=>{try{c.destroy();}catch(e){}});chartObjs=[];
  const cont=document.getElementById('charts-content');
  const rs=applyFilters(chartCourseFilter,chartPlayerFilter);
  if(!rs.length){cont.innerHTML='<div class="empty"><div class="empty-icon">📊</div>No rounds found.</div>';return;}
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const gc=isDark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)', tc=isDark?'#aaa9a3':'#666660';
  const labels=rs.map(r=>{const[y,m,d]=r.date.split('-');return d+'/'+m+'/'+y.slice(2);});
  const isSoloView=chartPlayerFilter==='f'||chartPlayerFilter==='a';
  const sFocus=chartPlayerFilter==='a'?'a':'f';

  // Data arrays — solo rounds only contribute to the playing player's line
  const dStabF=rs.map(r=>r.mode==='solo'?(r.soloPlayer==='f'?r.stabF:null):(r.stabF||0));
  const dStabA=rs.map(r=>r.mode==='solo'?(r.soloPlayer==='a'?r.stabA:null):(r.stabA||0));
  const dGrossF=rs.map(r=>r.mode==='solo'?(r.soloPlayer==='f'?r.grossF||null:null):(r.grossF||null));
  const dGrossA=rs.map(r=>r.mode==='solo'?(r.soloPlayer==='a'?r.grossA||null:null):(r.grossA||null));
  const dSwF=rs.map(r=>r.mode==='solo'?0:(r.strokeHolesF??r.holesF??0));
  const dSwA=rs.map(r=>r.mode==='solo'?0:(r.strokeHolesA??r.holesA??0));
  const dSbF=rs.map(r=>r.mode==='solo'?0:(r.stabHolesF??0));
  const dSbA=rs.map(r=>r.mode==='solo'?0:(r.stabHolesA??0));

  const paired=rs.filter(r=>r.mode!=='solo');
  const wF=paired.filter(r=>r.stabF>r.stabA).length, wA=paired.filter(r=>r.stabA>r.stabF).length, wd=paired.length-wF-wA;
  const swWF=paired.filter(r=>(r.strokeHolesF??r.holesF??0)>(r.strokeHolesA??r.holesA??0)).length;
  const swWA=paired.filter(r=>(r.strokeHolesA??r.holesA??0)>(r.strokeHolesF??r.holesF??0)).length;
  const swWD=paired.length-swWF-swWA;

  let innerHtml=`<div class="leg">
    <span><span class="lsq" style="background:#1D9E75"></span>Steve Fletcher</span>
    <span><span class="lsq" style="background:#378ADD;outline:2px dashed #378ADD;outline-offset:1px;"></span>Steve Adams</span>
  </div>
  <div class="chart-sec"><div class="ct">Stableford points per round</div><div style="font-size:11px;color:var(--text2);margin-bottom:6px;">Higher is better</div><div class="cw" style="height:240px;"><canvas id="ch-stab"></canvas></div></div>
  <div class="chart-sec"><div class="ct">Gross score per round</div><div style="font-size:11px;color:var(--text2);margin-bottom:6px;">Lower is better</div><div class="cw" style="height:240px;"><canvas id="ch-gross"></canvas></div></div>`;

  if(paired.length>0&&chartPlayerFilter==='all'){
    innerHtml+=`
    <div class="chart-sec"><div class="ct">Stableford holes won (paired rounds)</div><div class="cw" style="height:200px;"><canvas id="ch-sbholes"></canvas></div></div>
    <div class="chart-sec"><div class="ct">Stroke holes won (paired rounds)</div><div class="cw" style="height:200px;"><canvas id="ch-swholes"></canvas></div></div>
    <div class="chart-sec"><div class="ct">Overall Stableford record — ${paired.length} paired round${paired.length!==1?'s':''}</div>
      <div class="wins-row">
        <div class="metric gn"><div class="mv">${wF}</div><div class="ml">Fletcher wins</div></div>
        <div class="metric"><div class="mv">${wd}</div><div class="ml">Draws</div></div>
        <div class="metric bl"><div class="mv">${wA}</div><div class="ml">Adams wins</div></div>
      </div></div>
    <div class="chart-sec"><div class="ct">Overall stroke record</div>
      <div class="wins-row">
        <div class="metric gn"><div class="mv">${swWF}</div><div class="ml">Fletcher wins</div></div>
        <div class="metric"><div class="mv">${swWD}</div><div class="ml">Draws</div></div>
        <div class="metric bl"><div class="mv">${swWA}</div><div class="ml">Adams wins</div></div>
      </div></div>`;
  }
  cont.innerHTML=innerHtml;

  setTimeout(()=>{
    const xA={ticks:{color:tc,font:{size:10},maxRotation:45,autoSkip:rs.length>6},grid:{color:gc}};
    const yA=(lbl)=>({ticks:{color:tc,font:{size:10}},grid:{color:gc},title:{display:true,text:lbl,color:tc,font:{size:10}}});
    const nl={legend:{display:false}};
    const tt={callbacks:{title:items=>labels[items[0].dataIndex],label:item=>' '+(item.dataset.label==='F'?'Fletcher':'Adams')+': '+item.raw}};
    const c1=document.getElementById('ch-stab');
    if(c1)chartObjs.push(new Chart(c1,{type:'line',data:{labels,datasets:[{label:'F',data:dStabF,borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.12)',tension:0.3,pointRadius:5,fill:true,borderWidth:2,spanGaps:false},{label:'A',data:dStabA,borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,0.08)',tension:0.3,pointRadius:5,fill:true,borderWidth:2,borderDash:[6,3],spanGaps:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{...nl,tooltip:tt},scales:{x:xA,y:yA('Points')}}}));
    const c2=document.getElementById('ch-gross');
    if(c2)chartObjs.push(new Chart(c2,{type:'line',data:{labels,datasets:[{label:'F',data:dGrossF,borderColor:'#1D9E75',tension:0.3,pointRadius:5,borderWidth:2,spanGaps:false},{label:'A',data:dGrossA,borderColor:'#378ADD',tension:0.3,pointRadius:5,borderWidth:2,borderDash:[6,3],spanGaps:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{...nl,tooltip:tt},scales:{x:xA,y:yA('Strokes')}}}));
    const c3=document.getElementById('ch-sbholes');
    if(c3)chartObjs.push(new Chart(c3,{type:'bar',data:{labels:paired.map(r=>{const[y,m,d]=r.date.split('-');return d+'/'+m+'/'+y.slice(2);}),datasets:[{label:'F',data:dSbF.filter((_,i)=>rs[i]?.mode!=='solo'),backgroundColor:'rgba(29,158,117,0.7)',borderColor:'#1D9E75',borderWidth:1.5,borderRadius:3},{label:'A',data:dSbA.filter((_,i)=>rs[i]?.mode!=='solo'),backgroundColor:'rgba(55,138,221,0.7)',borderColor:'#378ADD',borderWidth:1.5,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{...nl,tooltip:tt},scales:{x:xA,y:{...yA('Holes'),beginAtZero:true}}}}));
    const c4=document.getElementById('ch-swholes');
    if(c4)chartObjs.push(new Chart(c4,{type:'bar',data:{labels:paired.map(r=>{const[y,m,d]=r.date.split('-');return d+'/'+m+'/'+y.slice(2);}),datasets:[{label:'F',data:dSwF.filter((_,i)=>rs[i]?.mode!=='solo'),backgroundColor:'rgba(29,158,117,0.7)',borderColor:'#1D9E75',borderWidth:1.5,borderRadius:3},{label:'A',data:dSwA.filter((_,i)=>rs[i]?.mode!=='solo'),backgroundColor:'rgba(55,138,221,0.7)',borderColor:'#378ADD',borderWidth:1.5,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{...nl,tooltip:tt},scales:{x:xA,y:{...yA('Holes'),beginAtZero:true}}}}));
  },80);
}
